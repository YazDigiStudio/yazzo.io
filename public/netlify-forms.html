<!DOCTYPE html>
<html>
  <body>
    <!-- Hidden form for Netlify build bot to detect at build time.
         This registers the "booking" form so AJAX submissions from
         the React BookingModal component are accepted. -->
    <form name="booking" netlify hidden>
      <input type="hidden" name="form-name" value="booking" />
      <input name="name" />
      <input name="email" />
      <input name="preferred-date" />
      <input name="preferred-time" />
      <textarea name="message"></textarea>
    </form>
  </body>
</html>
